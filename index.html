<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настоящая нейросеть - анализ и генерация кода</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 НАСТОЯЩАЯ НЕЙРОСЕТЬ</h1>
            <p>Анализирует интернет и САМА создаёт код, а не использует шаблоны</p>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="card">
                    <h3>🎯 Что нужно создать?</h3>
                    <textarea id="userPrompt" rows="4" placeholder="Например: Создай функцию, которая принимает массив чисел и возвращает только чётные числа"></textarea>
                    
                    <div class="form-group">
                        <label>Язык</label>
                        <select id="language">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                        </select>
                    </div>
                    
                    <button id="generateBtn">✨ ЗАПУСТИТЬ НЕЙРОСЕТЬ</button>
                    
                    <div id="loading" class="loading">
                        <div class="spinner"></div>
                        <div id="loadingSteps">
                            <p>🔍 Шаг 1/4: Поиск в интернете...</p>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="code-area">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="code">📝 Сгенерированный код</button>
                    <button class="tab-btn" data-tab="analysis">🔬 Анализ нейросети</button>
                    <button class="tab-btn" data-tab="run">▶️ Выполнить</button>
                </div>

                <div id="codeTab" class="tab-content active">
                    <pre id="generatedCode">// Нейросеть проанализирует интернет и создаст уникальный код</pre>
                    <button id="copyBtn" class="btn-small">📋 Копировать</button>
                </div>

                <div id="analysisTab" class="tab-content">
                    <div id="analysisLog" class="analysis-box"></div>
                </div>

                <div id="runTab" class="tab-content">
                    <div id="runOutput" class="output-box"></div>
                    <button id="executeBtn" class="btn-run">▶️ Выполнить</button>
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
